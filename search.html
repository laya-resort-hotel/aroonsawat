<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-page">
  <div class="container app-shell">
    <section class="page-header">
      <div class="page-header-row">
        <div>
          <span class="soft-badge">Lookup</span>
          <h1>Search Cards</h1>
          <p class="page-subtitle">ค้นหาการ์ดด้วย Voucher Code หรือ Card Label แล้วสั่ง Reuse / Disable / Enable / Delete ได้จากหน้าจอเดียว</p>
        </div>
      </div>
    </section>

    <div class="card section-card">
      <h2>Quick Search</h2>
      <input id="searchInput" type="text" placeholder="ใส่ Voucher Code หรือ Card Label" />
      <div class="inline-actions"><button id="searchBtn">Search</button></div>
    </div>

    <div id="result" class="card section-card hidden result-highlight"></div>

    <div class="nav no-print" id="navMenu"></div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { requireRole, renderNav } from "./auth-guard.js";
    import { collection, query, where, getDocs, doc, runTransaction, serverTimestamp, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const { user, profile } = await requireRole(["supervisor", "manager", "admin"]);
    renderNav(profile);

    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");
    const result = document.getElementById("result");

    let currentDocId = null;
    let currentData = null;

    function toDate(value) {
      if (!value) return null;
      try { return value.toDate ? value.toDate() : new Date(value); } catch { return null; }
    }
    function fmt(value) {
      const d = toDate(value);
      return d ? d.toLocaleString("th-TH") : "-";
    }
    function statusLabel(status) {
      if (status === "issued") return "Available";
      if (status === "redeemed") return "Used";
      if (status === "disabled") return "Disabled";
      return status || "-";
    }
    function allowedByScope(data) {
      if (profile.role === "admin") return true;
      return (data.department || "") === (profile.department || "");
    }

    async function findCard(keyword) {
      const byCode = await getDocs(query(collection(db, "vouchers"), where("voucher_code", "==", keyword)));
      if (!byCode.empty) return byCode.docs[0];
      const byLabel = await getDocs(query(collection(db, "vouchers"), where("card_label", "==", keyword)));
      return byLabel.empty ? null : byLabel.docs[0];
    }

    async function logAction(card, action, note) {
      await addDoc(collection(db, "voucher_logs"), {
        voucher_code: card.voucher_code || "",
        voucher_ref: card.internal_no || "",
        department: card.department || "",
        outlet: card.outlet || "",
        action,
        action_at: serverTimestamp(),
        action_by_uid: user.uid,
        action_by_name: profile.name || profile.employee_id || "",
        action_by_role: profile.role,
        note
      });
    }

    function renderCard(data) {
      result.classList.remove("hidden");
      result.innerHTML = `
        <h2>${data.card_label || data.voucher_code}</h2>
        <p><strong>Voucher Code:</strong> ${data.voucher_code || "-"}</p>
        <p><strong>Status:</strong> <span class="status-pill status-${data.status || "issued"}">${statusLabel(data.status)}</span></p>
        <p><strong>Card Group:</strong> ${data.card_group || "-"}</p>
        <p><strong>Outlet:</strong> ${data.outlet || "-"}</p>
        <p><strong>Department:</strong> ${data.department || "-"}</p>
        <p><strong>Redeemed At:</strong> ${fmt(data.redeemed_at)}</p>
        <p><strong>Reset Count:</strong> ${data.reset_count || 0}</p>
        <p><strong>Last Reset:</strong> ${fmt(data.last_reset_at)}</p>
        <div class="button-row" style="margin-top:12px;">
          ${data.status === "redeemed" ? `<button id="reuseBtn" type="button">Reuse Card</button>` : ""}
          ${data.status !== "disabled" ? `<button id="disableBtn" type="button" class="button-secondary">Disable Card</button>` : `<button id="enableBtn" type="button" class="button-secondary">Enable Card</button>`}
          <button id="detailBtn" type="button" class="button-ghost">Open Detail</button>
          ${profile.role === "admin" ? `<button id="deleteBtn" type="button" class="danger-btn">Delete Card</button>` : ""}
        </div>
      `;

      const reuseBtn = document.getElementById("reuseBtn");
      const disableBtn = document.getElementById("disableBtn");
      const enableBtn = document.getElementById("enableBtn");
      const detailBtn = document.getElementById("detailBtn");
      const deleteBtn = document.getElementById("deleteBtn");

      if (reuseBtn) reuseBtn.addEventListener("click", reuseCard);
      if (disableBtn) disableBtn.addEventListener("click", disableCard);
      if (enableBtn) enableBtn.addEventListener("click", enableCard);
      if (detailBtn) detailBtn.addEventListener("click", () => window.open(`voucher-detail.html?code=${encodeURIComponent(currentData.voucher_code || "")}`, "_blank"));
      if (deleteBtn) deleteBtn.addEventListener("click", deleteCard);
    }

    async function searchCard() {
      const keyword = searchInput.value.trim();
      if (!keyword) return alert("กรุณาใส่ Voucher Code หรือ Card Label");
      result.classList.remove("hidden");
      result.innerHTML = "กำลังค้นหา...";
      const found = await findCard(keyword);
      if (!found) {
        result.innerHTML = `<p class="error">ไม่พบการ์ดนี้ในระบบ</p>`;
        return;
      }
      currentDocId = found.id;
      currentData = found.data();
      if ((currentData.voucher_mode || "") !== "reusable_card") {
        result.innerHTML = `<p class="error">รายการนี้ไม่ใช่ Reusable Card Mode</p>`;
        return;
      }
      if (!allowedByScope(currentData)) {
        result.innerHTML = `<p class="error">คุณไม่มีสิทธิ์เข้าถึงการ์ดใบนี้</p>`;
        return;
      }
      renderCard(currentData);
    }

    async function reuseCard() {
      if (!currentDocId || !currentData) return;
      const ok = confirm(`ยืนยัน Reuse ${currentData.card_label || currentData.voucher_code}?`);
      if (!ok) return;
      try {
        const ref = doc(db, "vouchers", currentDocId);
        await runTransaction(db, async (transaction) => {
          const snap = await transaction.get(ref);
          if (!snap.exists()) throw new Error("ไม่พบการ์ดในระบบ");
          const latest = snap.data();
          if (latest.status !== "redeemed") throw new Error("Reuse ได้เฉพาะการ์ดที่ใช้แล้ว");
          transaction.update(ref, {
            status: "issued",
            redeemed_at: null,
            redeemed_by_uid: "",
            redeemed_by_name: "",
            last_reset_at: serverTimestamp(),
            last_reset_by_uid: user.uid,
            last_reset_by_name: profile.name || profile.employee_id || "",
            reset_count: (latest.reset_count || 0) + 1,
            updated_at: serverTimestamp()
          });
        });
        await logAction(currentData, "reused", "Card reset from Search");
        await searchCard();
      } catch (err) {
        alert(err.message);
      }
    }

    async function disableCard() {
      if (!currentDocId || !currentData) return;
      const ok = confirm(`ยืนยันปิดใช้งาน ${currentData.card_label || currentData.voucher_code}?`);
      if (!ok) return;
      try {
        await runTransaction(db, async (transaction) => {
          const ref = doc(db, "vouchers", currentDocId);
          const snap = await transaction.get(ref);
          if (!snap.exists()) throw new Error("ไม่พบการ์ดในระบบ");
          transaction.update(ref, {
            status: "disabled",
            disabled_reason: "Disabled from Search",
            updated_at: serverTimestamp()
          });
        });
        await logAction(currentData, "disabled", "Card disabled from Search");
        await searchCard();
      } catch (err) {
        alert(err.message);
      }
    }

    async function enableCard() {
      if (!currentDocId || !currentData) return;
      const ok = confirm(`ยืนยันเปิดใช้งาน ${currentData.card_label || currentData.voucher_code}?`);
      if (!ok) return;
      try {
        await runTransaction(db, async (transaction) => {
          const ref = doc(db, "vouchers", currentDocId);
          const snap = await transaction.get(ref);
          if (!snap.exists()) throw new Error("ไม่พบการ์ดในระบบ");
          transaction.update(ref, {
            status: "issued",
            disabled_reason: "",
            updated_at: serverTimestamp()
          });
        });
        await logAction(currentData, "enabled", "Card enabled from Search");
        await searchCard();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteCard() {
      if (profile.role !== "admin" || !currentDocId || !currentData) return;
      const confirmText = prompt(`พิมพ์ ${currentData.voucher_code} เพื่อยืนยันการลบถาวร`);
      if (confirmText !== currentData.voucher_code) return;
      try {
        await deleteDoc(doc(db, "vouchers", currentDocId));
        await logAction(currentData, "deleted", "Card deleted by admin");
        result.innerHTML = `<p class="success">ลบการ์ดถาวรแล้ว</p>`;
      } catch (err) {
        alert(err.message);
      }
    }

    searchBtn.addEventListener("click", searchCard);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchCard();
    });
  </script>
</body>
</html>
